version: "3.8"

# Run this docker-compose alongside the main cs523-bdt docker-compose.yml
# to add Elasticsearch and Kibana for the GitHub Activity dashboard.
#
# Usage:
#   docker-compose up -d
#
# Note: Both this file and the main docker-compose.yml must share the same
# Docker network so Spark can reach Elasticsearch at localhost:9200.

services:
  elasticsearch:
    image: elasticsearch:7.15.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elastic

  kibana:
    image: kibana:7.15.2
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - elastic

volumes:
  es_data:

networks:
  elastic:
    driver: bridge
